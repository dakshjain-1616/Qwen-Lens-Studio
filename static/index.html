<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen Lens Studio ✦</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --accent-primary: #a855f7;
            --accent-secondary: #06b6d4;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        }

        body.light-theme {
            --bg-deep: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg-deep); color: var(--text-main); transition: all 0.3s ease; min-height: 100vh; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .logo h1 { font-size: 2.5rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo p { color: var(--text-dim); margin-top: 0.5rem; }

        .theme-toggle { cursor: pointer; font-size: 1.5rem; background: none; border: none; color: var(--text-main); }

        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; overflow-x: auto; padding-bottom: 0.5rem; }
        .tab-btn { 
            padding: 0.75rem 1.5rem; border-radius: 999px; border: 2px solid transparent;
            background: var(--bg-card); color: var(--text-dim); cursor: pointer; white-space: nowrap;
            transition: all 0.2s; font-weight: 600;
        }
        .tab-btn.active { border-color: var(--accent-primary); color: var(--text-main); background: rgba(168, 85, 247, 0.1); }

        .panel { background: var(--bg-card); border-radius: 1.5rem; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); display: none; }
        .panel.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .upload-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
        .upload-zone { 
            border: 2px dashed var(--text-dim); border-radius: 1rem; padding: 2rem; text-align: center;
            cursor: pointer; transition: border-color 0.2s; position: relative; min-height: 200px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .upload-zone:hover { border-color: var(--accent-secondary); }
        .upload-zone img { max-width: 100%; max-height: 300px; border-radius: 0.5rem; margin-top: 1rem; }
        .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .controls { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
        input[type="text"], select { 
            padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid var(--text-dim);
            background: var(--bg-deep); color: var(--text-main); width: 100%;
        }

        .btn-analyze { 
            background: var(--gradient); color: white; border: none; padding: 1rem; 
            border-radius: 0.5rem; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            transition: transform 0.1s;
        }
        .btn-analyze:active { transform: scale(0.98); }
        .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

        .result-area { margin-top: 2rem; border-top: 1px solid var(--text-dim); padding-top: 1.5rem; }
        .thinking-box { 
            background: rgba(148, 163, 184, 0.1); border-left: 4px solid var(--text-dim);
            padding: 1rem; margin-bottom: 1rem; font-style: italic; color: var(--text-dim);
        }
        .answer-box { line-height: 1.6; white-space: pre-wrap; }

        .dual-result { display: grid; grid-template-columns: 1fr; gap: 1rem; }
        .section { padding: 1rem; border-left: 4px solid #ccc; border-radius: 0 0.5rem 0.5rem 0; background: rgba(0,0,0,0.1); }
        .section-sim { border-color: #3b82f6; }
        .section-diff { border-color: #f97316; }
        .section-verdict { border-color: #10b981; }

        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: bold; margin-bottom: 1rem; }

        pre { border-radius: 0.5rem; margin-top: 1rem; max-height: 500px; overflow: auto; }
        .copy-btn { float: right; padding: 0.25rem 0.5rem; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>Qwen Lens Studio ✦</h1>
                <p>Powered by Qwen3.6-35B-A3B • 73.4% SWE-Bench</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('reasoning')">Visual Reasoning</button>
            <button class="tab-btn" onclick="showTab('multilingual')">Multilingual</button>
            <button class="tab-btn" onclick="showTab('document')">Document IQ</button>
            <button class="tab-btn" onclick="showTab('code')">Code Lens</button>
            <button class="tab-btn" onclick="showTab('dual')">Dual Compare</button>
        </div>

        <!-- Reasoning Panel -->
        <div id="reasoning" class="panel active">
            <div class="upload-zone" id="drop-reasoning">
                <span>📸 Drop image or click to upload</span>
                <input type="file" accept="image/*" onchange="previewImage(this, 'img-reasoning')">
                <img id="img-reasoning" style="display:none">
            </div>
            <div class="controls">
                <input type="text" id="q-reasoning" placeholder="Ask a complex question about the image...">
                <label><input type="checkbox" id="check-thinking"> Show Thinking 🧠</label>
                <button class="btn-analyze" onclick="analyze('reasoning')">Analyze with Qwen</button>
            </div>
            <div class="result-area" id="res-reasoning"></div>
        </div>

        <!-- Multilingual Panel -->
        <div id="multilingual" class="panel">
            <div class="upload-zone">
                <span>📸 Drop image or click to upload</span>
                <input type="file" accept="image/*" onchange="previewImage(this, 'img-multi')">
                <img id="img-multi" style="display:none">
            </div>
            <div class="controls">
                <select id="lang-multi">
                    <option value="en">English 🇺🇸</option>
                    <option value="zh">中文 🇨🇳</option>
                    <option value="ja">日本語 🇯🇵</option>
                    <option value="es">Spanish 🇪🇸</option>
                    <option value="fr">French 🇫🇷</option>
                    <option value="de">German 🇩🇪</option>
                    <option value="ar">Arabic 🇸🇦</option>
                    <option value="hi">Hindi 🇮🇳</option>
                    <option value="ko">Korean 🇰🇷</option>
                    <option value="pt">Portuguese 🇵🇹</option>
                    <option value="ru">Russian 🇷🇺</option>
                </select>
                <button class="btn-analyze" onclick="analyze('multilingual')">Describe Image</button>
            </div>
            <div class="result-area" id="res-multi"></div>
        </div>

        <!-- Document Panel -->
        <div id="document" class="panel">
            <div class="upload-zone">
                <span>📄 Upload Invoice, Receipt, or ID</span>
                <input type="file" accept="image/*" onchange="previewImage(this, 'img-doc')">
                <img id="img-doc" style="display:none">
            </div>
            <div class="controls">
                <button class="btn-analyze" onclick="analyze('document')">Extract Data</button>
            </div>
            <div class="result-area" id="res-doc"></div>
        </div>

        <!-- Code Panel -->
        <div id="code" class="panel">
            <div class="upload-zone">
                <span>🖼️ Upload UI Screenshot</span>
                <input type="file" accept="image/*" onchange="previewImage(this, 'img-code')">
                <img id="img-code" style="display:none">
            </div>
            <div class="controls">
                <div style="display:flex; gap:1rem">
                    <label><input type="radio" name="fw" value="html" checked> HTML/CSS</label>
                    <label><input type="radio" name="fw" value="react"> React + Tailwind</label>
                    <label><input type="radio" name="fw" value="vue"> Vue 3</label>
                    <label><input type="radio" name="fw" value="svelte"> Svelte</label>
                </div>
                <button class="btn-analyze" onclick="analyze('code')">Generate Code</button>
            </div>
            <div class="result-area" id="res-code"></div>
        </div>

        <!-- Dual Panel -->
        <div id="dual" class="panel">
            <div class="upload-grid">
                <div class="upload-zone">
                    <span>🖼️ Image 1</span>
                    <input type="file" id="dual-1" accept="image/*" onchange="previewImage(this, 'img-dual-1')">
                    <img id="img-dual-1" style="display:none">
                </div>
                <div class="upload-zone">
                    <span>🖼️ Image 2</span>
                    <input type="file" id="dual-2" accept="image/*" onchange="previewImage(this, 'img-dual-2')">
                    <img id="img-dual-2" style="display:none">
                </div>
            </div>
            <div class="controls">
                <input type="text" id="q-dual" placeholder="Compare these images...">
                <button class="btn-analyze" onclick="analyze('dual')">Compare Images</button>
            </div>
            <div class="result-area" id="res-dual"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-jsx.min.js"></script>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const btn = document.querySelector('.theme-toggle');
            btn.innerText = document.body.classList.contains('light-theme') ? '☀️' : '🌙';
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }

        if(localStorage.getItem('theme') === 'light') toggleTheme();

        function showTab(tabId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        function previewImage(input, imgId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    input.parentElement.querySelector('span').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function analyze(type) {
            const resArea = document.getElementById(`res-${type === 'multilingual' ? 'multi' : type === 'document' ? 'doc' : type}`);
            resArea.innerHTML = '<div class="thinking-box">Qwen is thinking...</div>';
            
            const formData = new FormData();
            let url = `/api/${type === 'document' ? 'document-iq' : type === 'code' ? 'code-lens' : type}`;
            
            if (type === 'dual') {
                formData.append('image1', document.getElementById('dual-1').files[0]);
                formData.append('image2', document.getElementById('dual-2').files[0]);
                formData.append('question', document.getElementById('q-dual').value);
            } else {
                const input = document.querySelector(`#${type === 'document' ? 'document' : type} input[type="file"]`);
                formData.append('image', input.files[0]);
                
                if (type === 'reasoning') {
                    formData.append('question', document.getElementById('q-reasoning').value);
                    formData.append('show_thinking', document.getElementById('check-thinking').checked);
                } else if (type === 'multilingual') {
                    formData.append('language', document.getElementById('lang-multi').value);
                    url = '/api/multilingual';
                } else if (type === 'code') {
                    formData.append('framework', document.querySelector('input[name="fw"]:checked').value);
                }
            }

            try {
                const response = await fetch(url, { method: 'POST', body: formData });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let thinkingContent = "";
                let answerContent = "";
                resArea.innerHTML = ""; // Clear loader

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('event: thinking')) {
                            const data = JSON.parse(lines[lines.indexOf(line) + 1].replace('data: ', ''));
                            thinkingContent += data;
                            updateReasoningUI(resArea, thinkingContent, answerContent);
                        } else if (line.startsWith('event: answer')) {
                            const data = JSON.parse(lines[lines.indexOf(line) + 1].replace('data: ', ''));
                            answerContent += data;
                            updateReasoningUI(resArea, thinkingContent, answerContent);
                        } else if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.replace('data: ', ''));
                            answerContent += data;
                            if (type === 'document') {
                                resArea.innerHTML = `<pre><code class="language-json">${answerContent}</code></pre>`;
                                Prism.highlightAll();
                            } else if (type === 'code') {
                                resArea.innerHTML = `<pre><code class="language-javascript">${answerContent}</code></pre>`;
                                Prism.highlightAll();
                            } else if (type === 'dual') {
                                resArea.innerHTML = formatDual(answerContent);
                            } else {
                                resArea.innerHTML = `<div class="answer-box">${answerContent}</div>`;
                            }
                        }
                    }
                }
            } catch (e) {
                resArea.innerHTML = `<div style="color:red">Error: ${e.message}</div>`;
            }
        }

        function updateReasoningUI(container, thinking, answer) {
            let html = "";
            if (thinking) {
                html += `<details open class="thinking-box"><summary>🧠 Thinking Process</summary>${thinking}</details>`;
            }
            if (answer) {
                html += `<div class="answer-box">${answer}</div>`;
            }
            container.innerHTML = html;
        }

        function formatDual(text) {
            const sections = { sim: "", diff: "", verd: "" };
            const simMatch = text.match(/## Similarities\n([\s\S]*?)(?=## Differences|$)/i);
            const diffMatch = text.match(/## Differences\n([\s\S]*?)(?=## Verdict|$)/i);
            const verdMatch = text.match(/## Verdict\n([\s\S]*?)$/i);
            
            return `
                <div class="dual-result">
                    <div class="section section-sim"><h3>Similarities</h3>${simMatch ? simMatch[1] : ''}</div>
                    <div class="section section-diff"><h3>Differences</h3>${diffMatch ? diffMatch[1] : ''}</div>
                    <div class="section section-verdict"><h3>Verdict</h3>${verdMatch ? verdMatch[1] : ''}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
